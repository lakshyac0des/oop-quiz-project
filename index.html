<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title> QUIZ GAME </title>
   <link rel="stylesheet" href="style.css">

</head>
<body>
   <div class="container">
      <div class="screen active " id="start-screen">
         <h1> QUIZ TIME </h1>
         <p>Test your knowledge </p>
         <button id="start-btn"> START QUIZ </button>

      </div>
     <div class="screen " id="quiz-screen">
      <div class="quiz-header">
         <h2 id="question-text">question goes here </h2>
         <div class="quiz-info">
        <p>
         Question <span id="current-question">1</span> of <span id ="total-questions"> S</span>
        </p>
        <p>
         score: <span id ="score">0</span>
        </p>
         </div>
      </div>
<div id="answers-container" class="answers-container">
<!-- answrs button will be inserted here from our js code later at some point -->
</div>
<div class="progress-bar ">
<div id="progress" class="progress"> </div>   
</div>
 </div>
<div id="result-screen" class="screen">
<div class="result-info">
   <p> you scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
   
   <div id="result-message">Good job</div>
</div>
<button id="restart-btn">Restat-Quiz</button>
   </div>

<script src="script.js"></script>
</body>
</html>
